command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

env:
  - name: DATABRICKS_HOST
    value: "https://{host}.cloud.databricks.com"
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    value: ""
  - name: DATABRICKS_SQL_HTTP_PATH
    value: "/sql/1.0/warehouses/{id}"
  - name: DATABRICKS_CATALOG
    value: "zeb_capital_markets_demo"
  - name: DATABRICKS_SCHEMA
    value: "capital_markets_schema"
  - name: VECTOR_SEARCH_ENDPOINT
    value: "deal-intelligence-vs-endpoint"
  - name: VECTOR_SEARCH_INDEX
    value: "zeb_capital_markets_demo.capital_markets_schema.deal_document_chunks_index"
  - name: LLM_ENDPOINT_SONNET
    value: "databricks-claude-sonnet-4-5"
  - name: LLM_ENDPOINT_HAIKU
    value: "databricks-claude-haiku-4-5"
  - name: EMBEDDING_ENDPOINT
    value: "databricks-bge-large-en"
  - name: PRESIGNED_URL_EXPIRY_SECONDS
    value: "3600"
  - name: LOG_LEVEL
    value: "DEBUG"
  - name: DATABRICKS_SERVING_ENDPOINT
    value: "unified-intelligence-agent"
